<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenkei — Personal Finance</title>
  <meta name="description" content="A private, in-browser personal finance dashboard. Spending, subscriptions, budgets and net worth. Your data never leaves your device." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script>
    window.addEventListener("error", function (e) { var r = document.getElementById("root"); if (r && !r.hasChildNodes()) { r.innerHTML = "<div style=\"font-family:monospace;color:#BC4B36;padding:40px;max-width:700px;margin:0 auto\"><b>Something went wrong loading the app.</b><br><br>" + (e.message || e.error) + "</div>"; } });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
